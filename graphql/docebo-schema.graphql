# ─── Mutation Type ────────────────────────────────────────────────────────────

type Mutation {
  # Courses
  createCourse(input: CreateCourseInput!): Course!
  updateCourse(id: ID!, input: CreateCourseInput!): Course!
  deleteCourse(id: ID!): Boolean!
  publishCourse(id: ID!): Course!
  archiveCourse(id: ID!): Course!

  # Enrollments
  enrollUser(input: EnrollUserInput!): Enrollment!
  unenrollUser(enrollmentId: ID!): Boolean!
  updateEnrollmentStatus(enrollmentId: ID!, status: EnrollmentStatus!): Enrollment!
  completeEnrollment(enrollmentId: ID!): Enrollment!

  # Users
  createUser(input: UpdateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!
  activateUser(id: ID!): User!
  deactivateUser(id: ID!): User!

  # Groups & Branches
  addUserToGroup(userId: ID!, groupId: ID!): UserGroup!
  removeUserFromGroup(userId: ID!, groupId: ID!): Boolean!
  moveUserToBranch(userId: ID!, branchId: ID!): User!

  # Assessments
  submitTestAttempt(testId: ID!, answers: [ID!]!): TestAttempt!

  # Reports
  createReport(input: CreateReportInput!): Report!
  deleteReport(id: ID!): Boolean!
  exportReport(reportId: ID!, format: ExportFormat!): ReportExport!

  # Badges & Certificates
  awardBadge(userId: ID!, badgeId: ID!): Badge!
  issueCertificate(enrollmentId: ID!): Certificate!
  revokeCertificate(certificateId: ID!): Boolean!

  # Webhooks
  createWebhook(input: CreateWebhookInput!): Webhook!
  updateWebhook(id: ID!, input: CreateWebhookInput!): Webhook!
  deleteWebhook(id: ID!): Boolean!

  # Skills
  assignSkillToUser(userId: ID!, skillId: ID!, levelId: ID): UserSkill!
  updateUserSkillLevel(userSkillId: ID!, levelId: ID!): UserSkill!
}

# ─── Subscription Type ────────────────────────────────────────────────────────

type Subscription {
  enrollmentStatusChanged(userId: ID): Enrollment!
  courseCompleted(courseId: ID): Enrollment!
  badgeAwarded(userId: ID): Badge!
  certificateIssued(userId: ID): Certificate!
  testAttemptCompleted(testId: ID): TestAttempt!
  webhookEventDelivered(webhookId: ID!): WebhookEvent!
  userProgressUpdated(courseId: ID, userId: ID): Progress!
}
